<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Afra'nın Macerası 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Fredoka One', cursive;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #FF6B9D, #C44569, #a29bfe);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen h1 {
      color: #fff;
      font-size: 2.5rem;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      margin-bottom: 30px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-bar-container {
      width: 280px;
      height: 20px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      overflow: hidden;
    }

    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: #FFD93D;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    #loading-text {
      color: rgba(255,255,255,0.8);
      margin-top: 15px;
      font-size: 1rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Mobile touch controls */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      z-index: 50;
      pointer-events: none;
    }

    .ctrl-btn {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      font-size: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .ctrl-btn:active, .ctrl-btn.pressed {
      background: rgba(255, 255, 255, 0.5);
    }

    #btn-left { bottom: 20px; left: 20px; }
    #btn-right { bottom: 20px; left: 110px; }
    #btn-jump { bottom: 20px; right: 20px; }

    @media (pointer: coarse) {
      #mobile-controls { display: block; }
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>Afra'nın Macerası</h1>
    <div class="loading-bar-container">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
    <p id="loading-text">Yükleniyor...</p>
  </div>

  <div id="game-container"></div>

  <div id="mobile-controls">
    <div class="ctrl-btn" id="btn-left">&#9664;</div>
    <div class="ctrl-btn" id="btn-right">&#9654;</div>
    <div class="ctrl-btn" id="btn-jump">&#9650;</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script src="assets.js"></script>
  <script src="game.js"></script>
</body>
</html>
